<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0
    "
  >

  <title>
    Forgot Password
  </title>

  <link
    rel="stylesheet"
    href="forgot-password.css"
  >

</head>

<body>

  <div class="container">

    <div class="card">

      <h1>
        Forgot Password
      </h1>

      <p class="subtitle">
        Enter your email address and we'll send you a password reset link.
      </p>

      <input
        type="email"
        id="email"
        placeholder="Email address"
        autocomplete="email"
      >

      <button id="resetBtn">
        Send Reset Link
      </button>

      <div
        id="message"
        class="message"
      ></div>

      <a
        href="/login"
        class="back-link"
      >
        ← Back to Login
      </a>

    </div>

  </div>

  <script
    type="module"
    src="forgot-password.js"
  ></script>

</body>

</html>
