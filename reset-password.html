<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0
    "
  >

  <title>
    Reset Password
  </title>

  <link
    rel="stylesheet"
    href="reset-password.css"
  >

</head>

<body>

  <div class="container">

    <div class="card">

      <h1>
        Reset Password
      </h1>

      <p class="subtitle">
        Enter your new password below.
      </p>

      <div class="input-group">

        <input
          type="password"
          id="password"
          placeholder="New password"
        >

      </div>

      <div class="input-group">

        <input
          type="password"
          id="confirmPassword"
          placeholder="Confirm new password"
        >

      </div>

      <button id="resetBtn">
        Update Password
      </button>

      <div
        id="message"
        class="message"
      ></div>

    </div>

  </div>

  <script
    type="module"
    src="reset-password.js"
  ></script>

</body>

</html>
